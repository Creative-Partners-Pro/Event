<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Drunk Owl Refined Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400&amp;family=Space+Grotesk:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f20d20",
                        "accent-yellow": "#FFD700",
                        "background-dark": "#060608",
                    },
                    fontFamily: {
                        "display": ["Outfit", "sans-serif"],
                        "body": ["Space Grotesk", "sans-serif"],
                    },
                    boxShadow: {
                        'neon-yellow': '0 0 2px rgba(255, 215, 0, 0.6), 0 0 6px rgba(255, 215, 0, 0.4), 0 0 12px rgba(255, 215, 0, 0.2)',
                    },
                },
            },
        }
    </script>
    <style>
        .main-card-glow {
            box-shadow: 0 0 50px 10px rgba(242, 13, 32, 0.4), 0 0 100px 5px rgba(242, 13, 32, 0.15);
        }
        .text-glow-red {
            text-shadow: 0 0 10px rgba(242, 13, 32, 0.8), 0 0 20px rgba(242, 13, 32, 0.5), 0 0 30px rgba(242, 13, 32, 0.3);
        }
        .price-glow-red {
            text-shadow: 0 0 15px rgba(242, 13, 32, 0.9), 0 0 30px rgba(242, 13, 32, 0.4);
        }
        .glass-sheet {
            background: rgba(10, 10, 12, 0.6);
            backdrop-filter: blur(40px);
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        @keyframes neon-flicker {
            0%, 100% {
                text-shadow: 0 0 1px #FFD700, 0 0 3px #FFD700, 0 0 5px #FFD700, 0 0 8px #FF8D00, 0 0 12px #FF8D00;
                box-shadow: 0 0 1px rgba(255, 215, 0, 0.5), 0 0 3px rgba(255, 215, 0, 0.3), 0 0 5px rgba(255, 215, 0, 0.1);
            }
            50% {
                text-shadow: 0 0 2px #FFD700, 0 0 5px #FFD700, 0 0 10px #FFD700, 0 0 15px #FF8D00, 0 0 20px #FF8D00;
                box-shadow: 0 0 2px rgba(255, 215, 0, 0.6), 0 0 5px rgba(255, 215, 0, 0.4), 0 0 10px rgba(255, 215, 0, 0.2);
            }
        }
        .neon-flicker {
            animation: neon-flicker 2s infinite alternate;
        }
        #product-modal {
            transition: opacity 0.3s ease-in-out, transform 0.3s ease-in-out;
        }
        #product-modal.hidden {
            opacity: 0;
            transform: scale(0.95);
            pointer-events: none;
        }
        .font-display {
            font-family: 'Outfit', sans-serif;
        }
        .font-body {
            font-family: 'Space Grotesk', sans-serif;
        }

        /* Animation Styles */
        @keyframes fade-in {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes slide-in-from-left {
            from { transform: translateX(-100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes slide-in-from-right {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes slide-in-from-bottom {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .initial-hidden {
            opacity: 0;
        }

        .animate-on-load {
            animation-duration: 0.7s;
            animation-fill-mode: forwards;
            animation-timing-function: cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .fade-in-bg { animation-name: fade-in; }
        .slide-in-left { animation-name: slide-in-from-left; }
        .slide-in-right { animation-name: slide-in-from-right; }
        .slide-in-bottom { animation-name: slide-in-from-bottom; }

        .active-tip {
            background-color: #FFD700 !important;
            color: #000 !important;
            box-shadow: 0 0 8px rgba(255, 215, 0, 0.7);
        }
        .rating-owl {
            opacity: 0.3;
            transition: opacity 0.2s ease-in-out, transform 0.1s ease-in-out;
        }
        .rating-owl.hovered, .rating-owl.selected {
            opacity: 1;
            transform: scale(1.1);
        }
    </style>
</head>
<body class="min-h-screen relative bg-background-dark text-white overflow-hidden">
    <!-- Background Image -->
    <div class="fixed inset-0 z-0 initial-hidden animate-on-load fade-in-bg">
        <img alt="Cocktail Glass Background" class="w-full h-full object-cover scale-110 filter grayscale blur-lg brightness-50" src="https://lh3.googleusercontent.com/aida-public/AB6AXuABW2iAALtjWa1vQnEJDEoZp3zegtY9w2hN9-E4Hs6rsUMXb25f_FvIVxoJzGw6WVtzuqLD2DiQAZu8OXgg1AEBexZG_1I3UakHV_BpigR_xsJSBAFiaoyX0x9C70IQYa6yeR_qI0MgbdE8cZK_-52zW2C6LVc3Ky7q0DrYspVOunkos_IQx_kz07QQLK93-ggpcz4Qn2fNcouEB0ckx5TR0aQYHo1xNhl6cDHuGP70Zb8Q6SXD1ZRS6f9e4fYC9ympXAYbCg0A9DfX" />
        <div class="absolute inset-0 bg-black/50"></div>
    </div>

    <div class="relative z-10 flex flex-col h-[100dvh]">
        <header class="flex-none flex items-center justify-between px-8 pt-9 pb-2">
            <div class="flex flex-col">
                <span class="text-[10px] tracking-[0.4em] font-light uppercase text-accent-yellow/80 mb-1">Welcome to</span>
                <span class="text-2xl font-semibold tracking-tight text-white/90">Drunk Owl Bar</span>
            </div>
            <button id="close-menu-button" class="w-10 h-10 rounded-full border border-white/10 flex items-center justify-center bg-white/5 hover:bg-white/10 transition-colors cursor-pointer">
                <span class="material-symbols-outlined text-xl text-white/60">close</span>
            </button>
        </header>

        <main class="flex-1 flex flex-col pt-2 w-full min-h-0 overflow-y-auto no-scrollbar pb-32">
            <!-- Popular Now Carousel -->
            <div class="w-full pl-6 pr-0 mb-6 shrink-0 relative initial-hidden animate-on-load slide-in-left" style="animation-delay: 0.2s;">
                <h3 class="text-sm font-light tracking-widest uppercase text-white/50 pr-6 mb-3">Popular Now</h3>
                <div id="popular-now-carousel" class="flex gap-4 overflow-x-auto no-scrollbar pr-6">
                    <!-- Popular items will be injected here -->
                </div>
            </div>

            <!-- Selected Category Items -->
            <div id="selected-category-section" class="w-full mb-4 shrink-0 initial-hidden animate-on-load slide-in-right" style="animation-delay: 0.4s;">
                <h3 id="selected-category-title" class="px-6 text-sm font-light tracking-widest uppercase text-white/50 mb-3">Category Items</h3>
                <div id="selected-category-grid" class="flex flex-col gap-5">
                    <!-- Items from selected category will be injected here -->
                </div>
            </div>
        </main>

        <div class="flex-none flex flex-col w-full z-20 initial-hidden animate-on-load slide-in-bottom" style="animation-delay: 0.6s;">
            <div class="glass-sheet rounded-t-[32px] min-h-[100px] w-full flex flex-col shadow-sheet">
                <div class="w-10 h-1 bg-white/10 rounded-full mx-auto my-3 shrink-0"></div>

                <!-- Category Grid Container -->
                <div id="categories-grid-container" class="overflow-x-auto no-scrollbar px-6 py-2">
                    <div id="categories-grid" class="flex gap-4">
                        <!-- Category squares will be injected here -->
                    </div>
                </div>

                <!-- Type Switcher & Reviews -->
                <div class="px-6 pb-4 mt-2 flex justify-center items-center gap-3">
                    <div class="flex items-center p-1 rounded-full bg-black/40 backdrop-blur-md border border-white/10 w-full max-w-[200px]">
                        <button id="bar-button" class="flex-1 py-1.5 rounded-full text-[10px] font-bold uppercase tracking-widest">Bar</button>
                        <button id="food-button" class="flex-1 py-1.5 rounded-full text-[10px] font-bold uppercase tracking-widest">Food</button>
                    </div>
                    <button id="reviews-modal-trigger" class="h-8 w-8 flex items-center justify-center rounded-lg bg-black/40 backdrop-blur-md border border-white/10 text-white/60" title="Reviews">
                        <span class="material-symbols-outlined text-lg">reviews</span>
                    </button>
                </div>
            </div>
        </div>
    </div>
    <!-- Product Detail Modal (Bottom Sheet) -->
    <div id="product-modal" class="hidden fixed inset-0 z-50 flex items-end justify-center">
        <!-- Background Overlay -->
        <div id="modal-overlay" class="absolute inset-0 bg-black/60 backdrop-blur-sm"></div>

        <!-- Modal Content -->
        <div id="modal-content" class="relative z-20 w-full max-w-[500px] h-[85dvh] bg-[#0A0A0C] rounded-t-[40px] border-t border-white/10 flex flex-col overflow-hidden shadow-2xl transition-transform duration-300 translate-y-full">
            <!-- Drag Handle -->
            <div class="absolute top-0 left-0 right-0 h-10 flex items-start justify-center pt-3 z-30 cursor-grab active:cursor-grabbing">
                <div class="w-12 h-1.5 bg-white/20 rounded-full"></div>
            </div>

            <!-- Close Button -->
            <button id="modal-close-button" class="absolute top-4 right-6 z-30 w-10 h-10 rounded-full bg-white/5 border border-white/10 flex items-center justify-center text-white/60 hover:text-white hover:bg-white/10 transition-colors">
                <span class="material-symbols-outlined text-2xl">close</span>
            </button>

            <div class="flex-1 overflow-y-auto no-scrollbar pt-0">
                <!-- Image Header -->
                <div class="relative h-[45vh] w-full shrink-0">
                    <img id="modal-image" alt="Product Image" class="w-full h-full object-cover grayscale-[20%]" src="">
                    <div class="absolute inset-0 bg-gradient-to-t from-[#0A0A0C] via-transparent to-transparent"></div>
                </div>

                <!-- Info Section -->
                <div class="px-8 pb-12 -mt-16 relative z-10">
                    <div class="flex flex-col gap-4 mb-8">
                        <h2 id="modal-name" class="font-display text-4xl font-bold text-white tracking-tight leading-tight uppercase">
                            <!-- Product Name -->
                        </h2>
                        <div class="flex items-center gap-4">
                            <span id="modal-price" class="text-3xl font-body font-bold text-primary">
                                <!-- Price -->
                            </span>
                            <div id="modal-tags" class="flex flex-wrap gap-2"></div>
                        </div>
                    </div>

                    <!-- Description -->
                    <div class="mb-10">
                        <h3 id="label-desc" class="text-[10px] uppercase tracking-[0.2em] text-white/30 font-bold mb-3">Description</h3>
                        <p id="modal-desc" class="text-lg text-white/70 font-light leading-relaxed">
                            <!-- Description -->
                        </p>
                    </div>

                    <!-- Ingredients -->
                    <div class="mb-10">
                        <h3 id="label-ingredients" class="text-[10px] uppercase tracking-[0.2em] text-white/30 font-bold mb-3">Ingredients</h3>
                        <p id="modal-ingredients" class="text-lg text-white/70 font-light leading-relaxed">
                            <!-- Ingredients -->
                        </p>
                    </div>

                    <!-- Attributes (Strength, Volume, Taste) -->
                    <div id="modal-attributes" class="grid grid-cols-3 gap-4 border-t border-white/5 pt-8">
                        <div id="attr-strength" class="flex flex-col gap-1.5">
                            <span class="text-[9px] uppercase tracking-[0.2em] text-white/30 font-bold">Strength</span>
                            <span class="text-sm text-white font-medium" id="val-strength">-</span>
                        </div>
                        <div id="attr-volume" class="flex flex-col gap-1.5">
                            <span class="text-[9px] uppercase tracking-[0.2em] text-white/30 font-bold">Volume</span>
                            <span class="text-sm text-white font-medium" id="val-volume">-</span>
                        </div>
                        <div id="attr-taste" class="flex flex-col gap-1.5">
                            <span class="text-[9px] uppercase tracking-[0.2em] text-white/30 font-bold">Taste</span>
                            <span class="text-sm text-white font-medium capitalize" id="val-taste">-</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/menu.js"></script>

    <!-- Reviews & Tips Modal -->
    <div id="reviews-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center">
        <!-- Background Overlay -->
        <div id="reviews-modal-overlay" class="absolute inset-0 bg-black/30 backdrop-blur-md"></div>

        <!-- Modal Content -->
        <div class="relative z-20 w-[90%] max-w-[400px] bg-black/50 backdrop-blur-2xl rounded-3xl border border-white/10 p-6 flex flex-col gap-4">
            <div class="flex items-center justify-between">
                <h2 class="text-lg font-semibold text-white/90">Reviews & Tips</h2>
                <button id="reviews-modal-close-button" class="w-8 h-8 rounded-full flex items-center justify-center bg-white/5 hover:bg-white/10 transition-colors">
                    <span class="material-symbols-outlined text-md text-white/60">close</span>
                </button>
            </div>

            <!-- Google Maps Link -->
            <a href="https://www.google.com/search?q=drunk+owl+bar+%D0%BE%D1%82%D0%B7%D1%8B%D0%B2%D1%8B&oq=&gs_lcrp=EgZjaHJvbWUqCQgAEEUYOxjCAzIJCAAQRRg7GMIDMgkIARBFGDsYwgMyCQgCEEUYOxjCAzIJCAMQRRg7GMIDMgkIBBBFGDsYwgMyCQgFEEUYOxjCAzIJCAYQRRg7GMIDMgkIBxBFGDsYwgMyCQgIEEUYOxjCAzIJCAkQRRg7GMIDMgkIChBFGDsYwgMyCQgLEEUYOxjCAzIJCAwQRRg7GMIDMgkIDRBFGDsYwgMyCQgOEEUYOxjCA9IBBi0xajBqN6gCD7ACAQ&client=ms-android-zte&sourceid=chrome-mobile&ie=UTF-8#ebo=3" target="_blank" class="flex items-center justify-between p-3 bg-black/20 rounded-lg border border-white/10 hover:bg-white/5 transition-colors">
                <span class="text-white/80">Leave a public review on Google</span>
                <span class="material-symbols-outlined text-white/50">open_in_new</span>
            </a>

            <!-- Anonymous Review Form -->
            <form id="feedback-form" action="https://script.google.com/macros/s/AKfycbwjXc-EG7xuea6mw8HM7i1Kh7QSuBCALsKEUV5gxwcsDyI_sBvebsGWjTFOnOAYnPNI/exec" method="POST">
                <div class="border-t border-b border-white/5 py-4">
                    <label for="review-text" class="text-sm font-light text-white/50 mb-2 block">Or leave an anonymous review for the owner</label>
                    <div id="rating-container" class="flex items-center gap-2 mb-3">
                        <!-- Rating owls will be injected here -->
                    </div>
                    <input type="hidden" name="rating" id="rating-input" value="0">
                    <textarea id="review-text" name="feedback" rows="3" placeholder="Your feedback..." class="w-full bg-black/20 border border-white/10 rounded-lg p-2 text-white/80 focus:ring-1 focus:ring-accent-yellow focus:border-accent-yellow transition"></textarea>
                </div>
                <p id="feedback-error" class="text-red-500 text-xs mt-2 h-4"></p>
                <button id="send-feedback-button" type="submit" class="w-full py-3 bg-accent-yellow text-black font-bold rounded-lg hover:bg-yellow-400 transition mt-2">Send Feedback</button>
            </form>

            <div>
                <h3 class="text-sm font-light text-white/50 mb-2">Leave a tip</h3>
                <div class="flex items-start gap-4">
                    <div class="w-24 h-24 rounded-lg bg-white p-1 flex items-center justify-center">
                        <img id="tip-qr-code" src="img/qr-code-placeholder.svg" alt="QR Code for Tips" class="w-full h-full object-contain">
                    </div>
                    <div class="flex-1 flex flex-col gap-2">
                        <button data-tip="1" class="tip-button w-full py-2 bg-white/5 border border-white/10 rounded-lg text-white/70 hover:bg-accent-yellow hover:text-black transition">1 GEL</button>
                        <button data-tip="3" class="tip-button w-full py-2 bg-white/5 border border-white/10 rounded-lg text-white/70 hover:bg-accent-yellow hover:text-black transition">3 GEL</button>
                        <button data-tip="5" class="tip-button w-full py-2 bg-white/5 border border-white/10 rounded-lg text-white/70 hover:bg-accent-yellow hover:text-black transition">5 GEL</button>
                    </div>
                </div>
                <div class="mt-2">
                    <button id="copy-details-button" class="w-full text-center text-xs text-white/40 hover:text-accent-yellow transition-colors">
                        Copy bank account details
                    </button>
                    <span id="copy-success-message" class="text-xs text-green-400 hidden ml-2">Copied!</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
