<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Drunk Owl Premium Menu</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography,container-queries"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#06111C",
                        "background-light": "#06111C",
                        "background-dark": "#06111C",
                        accent: "#10B981",
                        "accent-red": "#EF4444",
                    },
                    fontFamily: {
                        display: ["Inter", "sans-serif"],
                    },
                    borderRadius: {
                        DEFAULT: "0.5rem",
                        xl: "1rem",
                        "2xl": "1.5rem",
                    },
                },
            },
        };
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #06111C;
        }
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .dark-glass {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .text-glow {
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }
        .neon-glow {
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.6);
            border-color: rgba(0, 255, 255, 0.8);
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-[#06111C] text-white antialiased min-h-screen flex flex-col items-center justify-start m-0 p-0 overflow-hidden">
    <div class="relative w-full h-screen bg-[#06111C] overflow-hidden flex flex-col mx-auto max-w-md md:max-w-full">
        <header class="flex items-center justify-between px-6 py-4 z-20 sticky top-0 bg-[#06111C]/80 backdrop-blur-md">
            <div class="flex items-center gap-2">
                <button id="calendar-btn" class="bg-white/10 p-2 rounded-lg flex items-center justify-center text-white">
                    <span class="material-icons text-sm">calendar_today</span>
                    <span id="header-date" class="text-xs font-bold ml-1">21</span>
                </button>
                <button id="lang-btn" class="bg-white/10 px-2 py-1.5 rounded-lg text-sm font-bold text-white">
                    EN
                </button>
            </div>
            <h1 class="text-lg font-bold text-center flex-1 text-white">Drunk Owl Bar</h1>
            <div class="flex items-center gap-2 relative">
                <button id="close-menu-button" class="bg-white/10 p-2 rounded-lg text-white">
                    <span class="material-icons">close</span>
                </button>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto hide-scrollbar relative">
            <div id="featured-image-container" class="absolute top-0 left-0 w-full h-[600px] z-0">
                <img id="featured-image" alt="Featured Item" class="w-full h-full object-cover object-top" src="img/placeholder.png"/>
                <div class="absolute inset-0 bg-gradient-to-b from-transparent via-[#06111C]/80 to-[#06111C] pointer-events-none h-full"></div>
            </div>

            <div class="relative z-20 px-6 pt-10 pb-32 flex">
                <div id="featured-details" class="flex-1 flex flex-col pr-4">
                    <span id="featured-tag" class="bg-accent text-white text-xs font-bold px-3 py-1 rounded-full self-start mb-16 hidden">Popular</span>

                    <div class="flex items-end gap-3 mb-2">
                        <div id="featured-abv-container" class="flex flex-col hidden">
                            <span class="text-[10px] text-gray-400 mb-1">volume</span>
                            <span id="featured-abv" class="bg-accent-red text-white text-xs font-bold px-2 py-1 rounded-md">15%</span>
                        </div>
                        <div class="bg-white/10 text-white px-3 py-1.5 rounded-xl font-bold text-xl flex items-center gap-1 shadow-md backdrop-blur-sm border border-white/5">
                            <span id="featured-price">0</span>
                            <span class="text-sm ml-1 text-accent">GEL</span>
                        </div>
                        <div id="featured-volume-container" class="bg-white/5 text-gray-300 text-xs font-bold px-2 py-1.5 rounded-lg shadow-sm border border-white/5 hidden">
                            <span id="featured-volume">300 ml</span>
                        </div>
                    </div>

                    <div class="rounded-2xl py-2 mb-4 relative overflow-hidden group">
                        <h2 id="featured-name" class="text-4xl font-extrabold text-white text-glow tracking-tight leading-tight mb-2 uppercase"></h2>
                    </div>

                    <div class="space-y-4 w-[85%]">
                        <div id="featured-ingredients-container" class="dark-glass rounded-2xl p-4 min-h-[80px]">
                            <h3 id="ingredients-label" class="text-sm text-gray-300 mb-1">Ingredients:</h3>
                            <p id="featured-ingredients" class="text-xs text-gray-400"></p>
                        </div>
                        <div id="featured-desc-container" class="dark-glass rounded-2xl p-4 min-h-[80px] hidden">
                            <h3 id="description-label" class="text-sm text-gray-300 mb-1">Description:</h3>
                            <p id="featured-desc" class="text-xs text-gray-400"></p>
                        </div>
                    </div>

                    <div class="flex items-center gap-3 mt-6">
                        <button id="more-info-btn" class="bg-white/10 text-white text-xs font-bold px-4 py-2 rounded-full flex items-center gap-1 border border-white/10">
                            <span id="more-info-text">More Info</span>
                            <span class="material-icons text-[14px]">arrow_forward</span>
                        </button>
                    </div>
                </div>

                <div class="w-20 flex flex-col items-center py-4 relative">
                    <button id="items-scroll-up" class="mb-4 text-gray-400 hover:text-white transition-colors">
                        <span class="material-icons text-sm">arrow_drop_up</span>
                    </button>

                    <div id="category-items-sidebar" class="flex flex-col items-center gap-6 flex-1 overflow-y-auto hide-scrollbar max-h-[400px]">
                        <!-- Items will be injected here -->
                    </div>

                    <button id="items-scroll-down" class="mt-4 text-gray-400 hover:text-white transition-colors">
                        <span class="material-icons text-sm">arrow_drop_down</span>
                    </button>
                </div>
            </div>
        </div>

        <div class="fixed bottom-0 left-0 w-full p-4 pb-8 bg-gradient-to-t from-[#06111C] via-[#06111C]/95 to-transparent z-30 flex flex-col gap-4">
            <div id="categories-nav" class="flex gap-2 overflow-x-auto hide-scrollbar px-2 max-w-md mx-auto w-full">
                <!-- Categories will be injected here -->
            </div>

            <div class="flex gap-3 px-2 max-w-md mx-auto w-full">
                <button id="reviews-modal-trigger" class="w-14 h-14 bg-gray-800 text-white rounded-2xl flex items-center justify-center shadow-lg border border-white/10">
                    <span class="material-icons text-3xl">chat_bubble_outline</span>
                </button>
                <div class="flex-1 rounded-2xl flex p-1 shadow-2xl border bg-white">
                    <button id="bar-button" class="flex-1 rounded-xl font-extrabold tracking-wider text-lg py-3 transition-all duration-300">
                        BAR
                    </button>
                    <button id="food-button" class="flex-1 rounded-xl font-extrabold tracking-wider text-lg py-3 transition-all duration-300">
                        FOOD
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Review Modal (hidden by default) -->
    <div id="reviews-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center">
        <div id="reviews-modal-overlay" class="absolute inset-0 bg-black/60 backdrop-blur-md"></div>
        <div class="relative z-20 w-[90%] max-w-[400px] bg-[#06111C] rounded-3xl border border-white/10 p-6 flex flex-col gap-4">
            <div class="flex items-center justify-between">
                <h2 id="reviews-title" class="text-lg font-semibold text-white/90">Reviews & Tips</h2>
                <button id="reviews-modal-close-button" class="w-8 h-8 rounded-full flex items-center justify-center bg-white/5 hover:bg-white/10 transition-colors">
                    <span class="material-icons text-md text-white/60">close</span>
                </button>
            </div>
            <a href="https://www.google.com/search?q=drunk+owl+bar+reviews" target="_blank" class="flex items-center justify-between p-3 bg-white/5 rounded-lg border border-white/10">
                <span id="google-review-text" class="text-white/80">Leave a review on Google</span>
                <span class="material-icons text-white/50">open_in_new</span>
            </a>
            <div class="border-t border-white/10 pt-4">
                <h3 id="tip-label" class="text-sm font-light text-white/50 mb-2">Leave a tip</h3>
                <div class="flex items-start gap-4">
                    <div class="w-24 h-24 bg-white rounded-lg p-1 flex items-center justify-center">
                        <img id="tip-qr-code" src="img/qr-code-placeholder.svg" alt="QR Code" class="w-full h-full object-contain">
                    </div>
                    <div class="flex-1 flex flex-col gap-2">
                        <button data-tip="1" class="tip-button w-full py-2 bg-white/5 border border-white/10 rounded-lg text-white/70">1 GEL</button>
                        <button data-tip="3" class="tip-button w-full py-2 bg-white/5 border border-white/10 rounded-lg text-white/70">3 GEL</button>
                        <button data-tip="5" class="tip-button w-full py-2 bg-white/5 border border-white/10 rounded-lg text-white/70">5 GEL</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/menu.js"></script>
</body>
</html>
